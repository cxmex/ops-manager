            desc: 'Based on Google Project Aristotle + Amy Edmondson (Harvard)',
            desc_es: 'Basado en Google Project Aristotle + Amy Edmondson (Harvard)',
            lessons: [
                {
                    id: 'l1_1', title: 'What Google Discovered About Great Teams',
                    title_es: 'Lo Que Google Descubrio Sobre los Grandes Equipos',
                    content_es: '<h2>Lo Que Google Descubrio Sobre los Grandes Equipos</h2>' +
                        '<div class="video-placeholder"><div class="icon">&#127909;</div><p>Video con Avatar IA (5 min) -- Proximamente. Lee la leccion abajo.</p></div>' +
                        '<p>En 2012, Google lanzo <strong>Project Aristotle</strong> -- un estudio masivo de mas de 180 equipos para descubrir que hace que algunos equipos sean excelentes y otros mediocres.</p>' +
                        '<p>Esperaban encontrar que los mejores equipos tenian a las personas mas inteligentes, o la mejor combinacion de habilidades. <strong>Estaban equivocados.</strong></p>' +
                        '<div class="key-concept"><h3>El Factor #1: Seguridad Psicologica</h3>' +
                        '<p>El factor mas importante no era QUIEN estaba en el equipo, sino COMO trabajaban juntos. Especificamente: <strong>los miembros del equipo se sienten seguros tomando riesgos, haciendo preguntas y admitiendo errores?</strong></p>' +
                        '<p>Los equipos con alta seguridad psicologica:</p><ul>' +
                        '<li>Tenian mas probabilidades de aprovechar ideas diversas</li><li>Tenian mas probabilidades de quedarse en Google</li><li>Fueron calificados como 2x mas efectivos por los ejecutivos</li><li>Generaban mas ingresos</li></ul></div>' +
                        '<blockquote>"La seguridad psicologica es la creencia de que no seras castigado o humillado por hablar con ideas, preguntas, preocupaciones o errores." -- Amy Edmondson, Harvard</blockquote>' +
                        '<h2>Los 5 Factores (En Orden de Importancia)</h2>' +
                        '<ol><li><strong>Seguridad Psicologica:</strong> Puedo tomar riesgos sin sentirme inseguro?</li>' +
                        '<li><strong>Confiabilidad:</strong> Puedo contar con mis companeros?</li>' +
                        '<li><strong>Estructura y Claridad:</strong> Estan claros los objetivos y roles?</li>' +
                        '<li><strong>Significado:</strong> Es este trabajo personalmente importante para mi?</li>' +
                        '<li><strong>Impacto:</strong> Importa nuestro trabajo?</li></ol>',
                    content: '<h2>What Google Discovered About Great Teams</h2>' +
                        '<div class="video-placeholder"><div class="icon">&#127909;</div><p>AI Avatar Video (5 min) -- Coming soon. Read the lesson below.</p></div>' +
                        '<p>In 2012, Google launched <strong>Project Aristotle</strong> -- a massive study of 180+ teams to find what makes some teams great and others mediocre.</p>' +
                        '<p>They expected to find that the best teams had the smartest people, or the best mix of skills. <strong>They were wrong.</strong></p>' +
                        '<div class="key-concept"><h3>The #1 Factor: Psychological Safety</h3>' +
                        '<p>The most important factor was not WHO was on the team, but HOW they worked together. Specifically: <strong>do team members feel safe taking risks, asking questions, and admitting mistakes?</strong></p>' +
                        '<p>Teams with high psychological safety were:</p><ul>' +
                        '<li>More likely to harness diverse ideas</li><li>More likely to stay at Google</li><li>Rated as 2x more effective by executives</li><li>Brought in more revenue</li></ul></div>' +
                        '<blockquote>"Psychological safety is the belief that you won\'t be punished or humiliated for speaking up with ideas, questions, concerns, or mistakes." -- Amy Edmondson, Harvard</blockquote>' +
                        '<h2>The 5 Factors (In Order of Importance)</h2>' +
                        '<ol><li><strong>Psychological Safety:</strong> Can I take risks without feeling insecure?</li>' +
                        '<li><strong>Dependability:</strong> Can I count on my teammates?</li>' +
                        '<li><strong>Structure & Clarity:</strong> Are goals and roles clear?</li>' +
                        '<li><strong>Meaning:</strong> Is this work personally important to me?</li>' +
                        '<li><strong>Impact:</strong> Does our work matter?</li></ol>',
                    quiz: [
                        { q: 'According to Google\'s Project Aristotle, what is the #1 factor that makes teams effective?', q_es: 'Segun el Project Aristotle de Google, cual es el factor #1 que hace efectivos a los equipos?', options: ['Having the smartest people', 'Psychological safety', 'Clear goals', 'Strong leadership'], options_es: ['Tener a las personas mas inteligentes', 'Seguridad psicologica', 'Objetivos claros', 'Liderazgo fuerte'], correct: 1, explanation: 'Psychological safety -- feeling safe to take risks and be vulnerable -- was the single most important factor, above all others.', explanation_es: 'La seguridad psicologica -- sentirse seguro para tomar riesgos y ser vulnerable -- fue el factor mas importante, por encima de todos los demas.' },

                        { q: 'Teams with high psychological safety were rated as how much more effective by executives?', q_es: 'Los equipos con alta seguridad psicologica fueron calificados como cuanto mas efectivos por los ejecutivos?', options: ['50% more', '2x more', '3x more', '10x more'], options_es: ['50% mas', '2x mas', '3x mas', '10x mas'], correct: 1, explanation: 'Executives rated psychologically safe teams as 2x more effective, and these teams also brought in more revenue.', explanation_es: 'Los ejecutivos calificaron a los equipos psicologicamente seguros como 2x mas efectivos, y estos equipos tambien generaron mas ingresos.' },
                    ]
                },
                {

                    title_es: 'Como Construir Seguridad Psicologica',
                    content_es: '<h2>Como Construir Seguridad Psicologica como Manager</h2>' +
                        '<div class="video-placeholder"><div class="icon">&#127909;</div><p>Video con Avatar IA (6 min) -- Proximamente.</p></div>' +
                        '<p>La seguridad psicologica no significa ser amable. Significa crear un ambiente donde las personas puedan ser <strong>sinceras</strong> -- donde el desacuerdo, las preguntas y los errores se traten como aprendizaje, no como amenazas.</p>' +
                        '<div class="key-concept"><h3>7 Acciones Que Construyen Seguridad</h3><ol>' +
                        '<li><strong>Enmarca el trabajo como aprendizaje, no ejecucion.</strong> "Estamos experimentando" vs "Necesitamos hacer esto bien."</li>' +
                        '<li><strong>Reconoce tu propia falibilidad.</strong> "Puedo estar equivocado. Que me estoy perdiendo?"</li>' +
                        '<li><strong>Modela la curiosidad.</strong> Haz preguntas genuinas, no solo des respuestas.</li>' +
                        '<li><strong>Responde productivamente a las malas noticias.</strong> "Gracias por senalarlo. Como lo arreglamos?" NO "Como dejaste que esto pasara?"</li>' +
                        '<li><strong>Normaliza las historias de fracaso.</strong> Comparte tus propios errores abiertamente.</li>' +
                        '<li><strong>Invita a participar explicitamente.</strong> "Sara, has estado callada. Cual es tu opinion?"</li>' +
                        '<li><strong>Sanciona las violaciones claras.</strong> Si alguien ridiculiza una pregunta, abordalo inmediatamente.</li></ol></div>' +
                        '<blockquote>"El trabajo del lider es crear las condiciones donde las personas puedan hacer su mejor trabajo. Eso empieza con la seguridad." -- Ed Catmull, Pixar</blockquote>',
                    content: '<h2>How to Build Psychological Safety as a Manager</h2>' +
                        '<div class="video-placeholder"><div class="icon">&#127909;</div><p>AI Avatar Video (6 min) -- Coming soon.</p></div>' +
                        '<p>Psychological safety doesn\'t mean being nice. It means creating an environment where people can be <strong>candid</strong> -- where disagreement, questions, and mistakes are treated as learning, not threats.</p>' +
                        '<div class="key-concept"><h3>7 Actions That Build Safety</h3><ol>' +
                        '<li><strong>Frame work as learning, not execution.</strong> "We\'re experimenting" vs "We need to get this right."</li>' +
                        '<li><strong>Acknowledge your own fallibility.</strong> "I may be wrong about this. What am I missing?"</li>' +
                        '<li><strong>Model curiosity.</strong> Ask genuine questions, don\'t just give answers.</li>' +
                        '<li><strong>Respond productively to bad news.</strong> "Thanks for flagging that. How do we fix it?" NOT "How did you let this happen?"</li>' +
                        '<li><strong>Normalize failure stories.</strong> Share your own mistakes openly.</li>' +
                        '<li><strong>Invite input explicitly.</strong> "Sarah, you\'ve been quiet. What\'s your take?"</li>' +
                        '<li><strong>Sanction clear violations.</strong> If someone ridicules a question, address it immediately.</li></ol></div>' +
                        '<blockquote>"The leader\'s job is to create the conditions where people can do their best work. That starts with safety." -- Ed Catmull, Pixar</blockquote>',
                    quiz: [
                        { q: 'A team member brings you bad news about a project delay. The best response is:', q_es: 'Un miembro del equipo te trae malas noticias sobre un retraso en el proyecto. La mejor respuesta es:', options: ['"How did you let this happen?"', '"Thanks for flagging that. How do we fix it?"', '"Let\'s discuss this in the team meeting"', '"I\'ll handle it myself"'], options_es: ['"Como dejaste que esto pasara?"', '"Gracias por senalarlo. Como lo arreglamos?"', '"Vamos a discutirlo en la junta de equipo"', '"Yo me encargo"'], correct: 1, explanation: 'Responding productively to bad news encourages people to surface problems early. Blaming them ensures they hide problems next time.', explanation_es: 'Responder productivamente a malas noticias motiva a las personas a reportar problemas temprano. Culparlos asegura que oculten problemas la proxima vez.' },
                        { q: 'Psychological safety means:', q_es: 'La seguridad psicologica significa:', options: ['Everyone is nice to each other', 'There are no disagreements', 'People feel safe being candid and vulnerable', 'The manager protects everyone from criticism'], options_es: ['Todos son amables entre si', 'No hay desacuerdos', 'Las personas se sienten seguras siendo sinceras y vulnerables', 'El manager protege a todos de la critica'], correct: 2, explanation: 'It\'s not about being nice -- it\'s about candor. People should feel safe to disagree, ask questions, and admit mistakes without fear.', explanation_es: 'No se trata de ser amable -- se trata de sinceridad. Las personas deben sentirse seguras para disentir, hacer preguntas y admitir errores sin miedo.' },
                        { q: 'Which action does NOT build psychological safety?', q_es: 'Cual accion NO construye seguridad psicologica?', options: ['Sharing your own mistakes', 'Asking "What am I missing?"', 'Publicly criticizing someone who made an error', 'Explicitly inviting quiet team members to speak'], options_es: ['Compartir tus propios errores', 'Preguntar "Que me estoy perdiendo?"', 'Criticar publicamente a alguien que cometio un error', 'Invitar explicitamente a hablar a los miembros callados'], correct: 2, explanation: 'Public criticism destroys safety. Everyone watching learns: "If I make a mistake, I\'ll be humiliated too." Address issues privately.', explanation_es: 'La critica publica destruye la seguridad. Todos los que observan aprenden: "Si cometo un error, tambien sere humillado." Aborda los problemas en privado.' },
                    ]
                },
                {
                    id: 'l1_3', title: 'The 5 Dysfunctions of a Team',
                    title_es: 'Las 5 Disfunciones de un Equipo',
                    content_es: '<h2>Las 5 Disfunciones de un Equipo de Lencioni</h2>' +
                        '<div class="video-placeholder"><div class="icon">&#127909;</div><p>Video con Avatar IA (5 min) -- Proximamente.</p></div>' +
                        '<p>El framework de Patrick Lencioni es una piramide. <strong>No puedes arreglar la parte superior sin arreglar primero la base.</strong></p>' +
                        '<div class="key-concept"><h3>La Piramide (De Abajo Hacia Arriba)</h3><ol>' +
                        '<li><strong>Ausencia de Confianza:</strong> Las personas ocultan debilidades y errores. No son vulnerables. (Solucion: ejercicio de historias personales, confianza basada en vulnerabilidad)</li>' +
                        '<li><strong>Miedo al Conflicto:</strong> Armonia artificial. Las personas estan de acuerdo en las juntas pero en desacuerdo en los pasillos. (Solucion: buscar el conflicto, exigir debate)</li>' +
                        '<li><strong>Falta de Compromiso:</strong> Sin debate real, no hay aceptacion. Las personas salen de las juntas con ambiguedad. (Solucion: comunicacion en cascada, fechas limite)</li>' +
                        '<li><strong>Evasion de Responsabilidad:</strong> Las personas no confrontan a sus pares sobre comportamientos. Solo el manager rinde cuentas. (Solucion: responsabilidad entre pares, metas publicas)</li>' +
                        '<li><strong>Falta de Atencion a Resultados:</strong> Las personas priorizan ego, carrera o departamento sobre resultados del equipo. (Solucion: tablero publico, recompensas basadas en equipo)</li></ol></div>' +
                        '<h2>Como Diagnosticar a Tu Equipo</h2>' +
                        '<p>Si tu equipo evita conversaciones dificiles, empieza en #2. Si tienen conversaciones dificiles pero no dan seguimiento, es #3 o #4. Si ejecutan pero no ganan, es #5.</p>',
                    content: '<h2>Lencioni\'s 5 Dysfunctions of a Team</h2>' +
                        '<div class="video-placeholder"><div class="icon">&#127909;</div><p>AI Avatar Video (5 min) -- Coming soon.</p></div>' +
                        '<p>Patrick Lencioni\'s framework is a pyramid. <strong>You can\'t fix the top without fixing the bottom first.</strong></p>' +
                        '<div class="key-concept"><h3>The Pyramid (Bottom to Top)</h3><ol>' +
                        '<li><strong>Absence of Trust:</strong> People hide weaknesses and mistakes. They won\'t be vulnerable. (Fix: personal histories exercise, vulnerability-based trust)</li>' +
                        '<li><strong>Fear of Conflict:</strong> Artificial harmony. People agree in meetings but disagree in hallways. (Fix: mine for conflict, demand debate)</li>' +
                        '<li><strong>Lack of Commitment:</strong> Without real debate, there\'s no buy-in. People leave meetings ambiguous. (Fix: cascade communication, deadlines)</li>' +

var progress = JSON.parse(localStorage.getItem('manager_course_progress') || '{}');
var currentLesson = null;

// SIDEBAR

function renderSidebar() {
    var sb = document.getElementById('sidebar');
    var html = '<div class="lang-toggle"><button class="lang-btn ' + (currentLang === 'es' ? 'active' : '') + '" onclick="setLang(\'es\')">ES</button><button class="lang-btn ' + (currentLang === 'en' ? 'active' : '') + '" onclick="setLang(\'en\')">EN</button></div>';
    html += '<h3>' + T('Course Modules', 'Modulos del Curso') + '</h3>';
    var totalLessons = 0;
    var completedLessons = 0;

    COURSE.modules.forEach(function(mod) {
        var modCompleted = mod.lessons.filter(function(l) { return progress[l.id]; }).length;
        totalLessons += mod.lessons.length;
        completedLessons += modCompleted;
        var isOpen = mod.lessons.some(function(l) { return currentLesson && currentLesson.id === l.id; });
        var modTitle = currentLang === 'es' ? (mod.title_es || mod.title) : mod.title;

        html += '<div class="module-header" onclick="toggleModule(\'' + mod.id + '\')">' +
            '<span class="arrow ' + (isOpen ? 'open' : '') + '" id="arrow_' + mod.id + '">&#9654;</span>' +
            '<span>' + modTitle + ' (' + modCompleted + '/' + mod.lessons.length + ')</span></div>';
        html += '<div class="lesson-list ' + (isOpen ? 'open' : '') + '" id="lessons_' + mod.id + '">';
        mod.lessons.forEach(function(lesson, idx) {
            var isCompleted = progress[lesson.id];
            var isActive = currentLesson && currentLesson.id === lesson.id;
            var isLocked = idx > 0 && !progress[mod.lessons[idx-1].id];
            var lessonTitle = currentLang === 'es' ? (lesson.title_es || lesson.title) : lesson.title;
            html += '<div class="lesson-item ' + (isActive ? 'active' : '') + ' ' + (isCompleted ? 'completed' : '') + '" ' +
                (isLocked ? 'style="opacity:0.4;cursor:not-allowed;" title="' + T('Pass previous quiz to unlock', 'Pasar quiz anterior para desbloquear') + '"' : 'onclick="loadLesson(\'' + mod.id + '\',\'' + lesson.id + '\')"') + '>' +
                '<span class="icon">' + (isCompleted ? '&#10003;' : (isLocked ? '&#128274;' : '&#9675;')) + '</span>' +
                '<span>' + lessonTitle + '</span></div>';
        });
        html += '</div>';
    });

    var pct = totalLessons > 0 ? Math.round(completedLessons / totalLessons * 100) : 0;
    html += '<div class="progress-mini"><div class="fill" style="width:' + pct + '%"></div></div>';
    html += '<div style="padding:4px 16px;font-size:0.75rem;color:#64748b;">' + pct + T('% complete', '% completado') + ' (' + completedLessons + '/' + totalLessons + ')</div>';
    sb.innerHTML = html;
}

function toggleModule(modId) {
    var list = document.getElementById('lessons_' + modId);
    var arrow = document.getElementById('arrow_' + modId);
    list.classList.toggle('open');
    arrow.classList.toggle('open');
}

function loadLesson(modId, lessonId) {
    var mod = COURSE.modules.find(function(m) { return m.id === modId; });

    currentLesson._modId = modId;

    var content = document.getElementById('content');
    var quizHTML = '<div class="quiz-section"><h3>' + T('Knowledge Check', 'Verificacion de Conocimiento') + '</h3><div class="subtitle">' + T('Score 80% or higher to advance to the next lesson', 'Obtener 80% o mas para avanzar a la siguiente leccion') + '</div>';

    lesson.quiz.forEach(function(q, qi) {
        var qText = currentLang === 'es' ? (q.q_es || q.q) : q.q;
        var qOpts = currentLang === 'es' ? (q.options_es || q.options) : q.options;

            quizHTML += '<div class="option" id="opt_' + qi + '_' + oi + '" onclick="selectOption(' + qi + ',' + oi + ')">' + opt + '</div>';
        });
        quizHTML += '</div><div class="explanation" id="exp_' + qi + '">' + qExp + '</div></div>';
    });

    quizHTML += '<button class="btn-quiz" id="submitQuiz" onclick="submitQuiz()">' + T('Submit Answers', 'Enviar Respuestas') + '</button>';
    quizHTML += '<div id="quizResult"></div></div>';

    var lessonIdx = mod.lessons.indexOf(lesson);

        navHTML += '<button class="btn-nav btn-prev" onclick="navPrev()">&#8592; ' + T('Previous', 'Anterior') + '</button>';

    navHTML += '</div>';

    var modTitle = currentLang === 'es' ? (mod.title_es || mod.title) : mod.title;
    var modDesc = currentLang === 'es' ? (mod.desc_es || mod.desc) : mod.desc;
    var lessonContent = currentLang === 'es' ? (lesson.content_es || lesson.content) : lesson.content;
    content.innerHTML = '<h1>' + modTitle + '</h1><p style="color:#64748b;font-size:0.85rem;margin-bottom:24px;">' + modDesc + '</p>' + lessonContent + quizHTML + navHTML;
    renderSidebar();
    content.scrollTop = 0;
    document.getElementById('sidebar').classList.remove('open');
}

var selectedAnswers = {};

function selectOption(qi, oi) {
    // Deselect all in this question
    var opts = document.querySelectorAll('#qq_' + qi + ' .option');
    opts.forEach(function(o) { o.classList.remove('selected'); });
    document.getElementById('opt_' + qi + '_' + oi).classList.add('selected');
    selectedAnswers[qi] = oi;
}

function submitQuiz() {
    var quiz = currentLesson.quiz;
    var correct = 0;
    var total = quiz.length;

    quiz.forEach(function(q, qi) {
        var selected = selectedAnswers[qi];
        var opts = document.querySelectorAll('#qq_' + qi + ' .option');
        opts.forEach(function(o) { o.style.pointerEvents = 'none'; });

        if (selected === undefined) return;
        if (selected === q.correct) {
            document.getElementById('opt_' + qi + '_' + selected).classList.add('correct');
            correct++;
        } else {
            document.getElementById('opt_' + qi + '_' + selected).classList.add('wrong');
            document.getElementById('opt_' + qi + '_' + q.correct).classList.add('correct');
        }
        document.getElementById('exp_' + qi).style.display = 'block';
    });

    var pct = Math.round(correct / total * 100);
    var pass = pct >= 80;
    var resultDiv = document.getElementById('quizResult');

    if (pass) {
        progress[currentLesson.id] = true;
        localStorage.setItem('manager_course_progress', JSON.stringify(progress));
        resultDiv.innerHTML = '<div class="quiz-result pass"><h3 style="color:#22c55e;">' + pct + '% -- ' + T('Passed!', 'Aprobado!') + '</h3><p style="color:#94a3b8;">' + T('You scored ' + correct + '/' + total + '. Next lesson unlocked.', 'Obtuviste ' + correct + '/' + total + '. Siguiente leccion desbloqueada.') + '</p></div>';
        var btnNext = document.getElementById('btnNext');
        if (btnNext) { btnNext.disabled = false; btnNext.classList.remove('locked'); var lockText = btnNext.querySelector('.lock-text'); if (lockText) lockText.remove(); btnNext.onclick = navNext; }
    } else {
        resultDiv.innerHTML = '<div class="quiz-result fail"><h3 style="color:#ef4444;">' + pct + '% -- ' + T('Not yet', 'Aun no') + '</h3><p style="color:#94a3b8;">' + T('You need 80% to advance. Review the lesson and try again.', 'Necesitas 80% para avanzar. Revisa la leccion e intenta de nuevo.') + '</p>' +
            '<button class="btn-quiz" style="margin-top:12px;" onclick="retryQuiz()">' + T('Retry Quiz', 'Reintentar Quiz') + '</button></div>';
    }

    document.getElementById('submitQuiz').style.display = 'none';
    renderSidebar();
}

function retryQuiz() {
    selectedAnswers = {};
    loadLesson(currentLesson._modId, currentLesson.id);
}

function navNext() {
    var mod = COURSE.modules.find(function(m) { return m.id === currentLesson._modId; });
    var idx = mod.lessons.indexOf(currentLesson);
    if (idx < mod.lessons.length - 1) {
        loadLesson(mod.id, mod.lessons[idx + 1].id);
    } else {
        var modIdx = COURSE.modules.indexOf(mod);
        if (modIdx < COURSE.modules.length - 1) {
            var nextMod = COURSE.modules[modIdx + 1];
            loadLesson(nextMod.id, nextMod.lessons[0].id);
        }
    }
}

function navPrev() {
    var mod = COURSE.modules.find(function(m) { return m.id === currentLesson._modId; });
    var idx = mod.lessons.indexOf(currentLesson);
    if (idx > 0) {
        loadLesson(mod.id, mod.lessons[idx - 1].id);
    } else {
        var modIdx = COURSE.modules.indexOf(mod);
        if (modIdx > 0) {
            var prevMod = COURSE.modules[modIdx - 1];
            loadLesson(prevMod.id, prevMod.lessons[prevMod.lessons.length - 1].id);
        }
    }
}

// Init
renderSidebar();
setLang(currentLang);
</script>
</body>
</html>
