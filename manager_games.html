<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager Games | Leadership Assessment Through Play</title>
    <meta property="og:title" content="Manager Games - 3 Mini-Games That Reveal Your Leadership Style">
    <meta property="og:description" content="Delegation, crisis management, and team building games based on Google and Harvard research.">
    <meta property="og:image" content="https://ogforge.dev/api/v1?title=Manager+Games&subtitle=3+games+that+reveal+your+leadership+style&theme=dark&accent=3b82f6">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
        .screen { display: none; min-height: 100vh; }
        .screen.active { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #1e293b; border-radius: 16px; padding: 32px; max-width: 500px; width: 100%; text-align: center; }
        .card h1 { font-size: 1.6rem; color: #3b82f6; margin-bottom: 8px; }
        .card p { font-size: 0.9rem; color: #94a3b8; line-height: 1.5; margin-bottom: 16px; }
        .btn { padding: 14px 32px; border-radius: 10px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn:hover { transform: translateY(-2px); }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-green { background: #22c55e; color: white; }
        .btn-amber { background: #f59e0b; color: #0f172a; }
        .game-header { width: 100%; max-width: 500px; display: flex; justify-content: space-between; align-items: center; padding: 12px 0; margin-bottom: 16px; }
        .game-header .label { font-size: 0.85rem; color: #3b82f6; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .game-header .timer { font-size: 1.1rem; font-weight: 700; color: #fbbf24; }
        .progress-bar { width: 100%; max-width: 500px; height: 4px; background: #334155; border-radius: 2px; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: #3b82f6; border-radius: 2px; transition: width 0.3s; }
        .scenario-card { background: #1e293b; border-radius: 12px; padding: 24px; max-width: 500px; width: 100%; text-align: left; margin-bottom: 16px; }
        .scenario-card h2 { color: #3b82f6; font-size: 1.1rem; margin-bottom: 8px; }
        .scenario-card p { font-size: 0.85rem; color: #94a3b8; line-height: 1.5; }
        .choice-btn { display: block; width: 100%; max-width: 500px; padding: 14px 16px; margin: 6px 0; background: #1e293b; border: 2px solid #334155; border-radius: 10px; color: #e2e8f0; font-size: 0.9rem; text-align: left; cursor: pointer; transition: all 0.15s; line-height: 1.4; }
        .choice-btn:hover { border-color: #3b82f6; transform: translateX(4px); }
        .choice-btn.selected { border-color: #22c55e; background: #1a2e1a; }
        .slider-row { display: flex; align-items: center; gap: 12px; margin: 10px 0; width: 100%; max-width: 500px; }
        .slider-row .label { width: 110px; text-align: right; font-size: 0.8rem; color: #94a3b8; flex-shrink: 0; }
        .slider-row input[type="range"] { flex: 1; accent-color: #3b82f6; }
        .slider-row .value { width: 35px; text-align: center; font-weight: 600; color: #3b82f6; font-size: 0.9rem; }
        .result-card { background: #1e293b; border-radius: 16px; padding: 24px; max-width: 500px; width: 100%; margin-bottom: 16px; }
        .archetype-badge { font-size: 1.5rem; font-weight: 800; color: #3b82f6; margin: 8px 0; }
        .dim-row { display: flex; align-items: center; margin: 6px 0; }
        .dim-row .nm { width: 100px; font-size: 0.8rem; color: #94a3b8; }
        .dim-row .bar-bg { flex: 1; height: 8px; background: #334155; border-radius: 4px; }
        .dim-row .bar-fg { height: 100%; border-radius: 4px; transition: width 0.8s; }
        .dim-row .pct { width: 40px; text-align: right; font-size: 0.8rem; color: #3b82f6; font-weight: 600; }
        .share-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
        .share-row a, .share-row button { padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; text-decoration: none; cursor: pointer; border: none; }
        .wa-btn { background: #25D366; color: white; }
        .copy-btn { background: #334155; color: #e2e8f0; border: 1px solid #3b82f6 !important; }
        .transition { position: fixed; inset: 0; background: #0f172a; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 50; }
        .transition.active { display: flex; }
        .transition .emoji { font-size: 4rem; margin-bottom: 16px; }
        .transition .countdown { font-size: 2rem; font-weight: 700; color: #3b82f6; }
        @media (max-width: 600px) { .card { padding: 24px 16px; } .slider-row .label { width: 80px; font-size: 0.75rem; } }
    </style>
</head>
<body>

<div class="screen active" id="landingScreen">
    <div class="card">
        <h1>Manager Games</h1>
        <p>3 mini-games that reveal your leadership style through decisions, not self-report. Takes ~5 minutes.</p>
        <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;">
            <span style="padding:4px 12px;background:#0f2e0f;color:#22c55e;border-radius:20px;font-size:0.75rem;">Delegation</span>
            <span style="padding:4px 12px;background:#2a1a0a;color:#f59e0b;border-radius:20px;font-size:0.75rem;">Crisis Management</span>
            <span style="padding:4px 12px;background:#1a1a2e;color:#a78bfa;border-radius:20px;font-size:0.75rem;">Team Building</span>
        </div>
        <button class="btn btn-primary" onclick="startGames()">Play Now</button>
        <p style="font-size:0.75rem;color:#64748b;margin-top:12px;">No registration. Instant results.</p>
    </div>
</div>

<div class="transition" id="transitionScreen">
    <div class="emoji" id="transEmoji"></div>
    <h2 id="transTitle" style="color:#e2e8f0;"></h2>
    <p id="transDesc" style="color:#94a3b8;font-size:0.9rem;margin-bottom:16px;max-width:400px;text-align:center;"></p>
    <div class="countdown" id="transCount">3</div>
</div>

<div class="screen" id="game1Screen">
    <div class="game-header"><span class="label" id="g1Label">Game 1: Delegation</span><span class="timer" id="g1Timer">0:00</span></div>
    <div class="progress-bar"><div class="progress-fill" id="g1Progress" style="width:0%"></div></div>
    <div id="g1Area"></div>
</div>

<div class="screen" id="game2Screen">
    <div class="game-header"><span class="label">Game 2: Crisis Management</span><span class="timer" id="g2Timer">0:00</span></div>
    <div class="progress-bar"><div class="progress-fill" id="g2Progress" style="width:0%"></div></div>
    <div id="g2Area"></div>
</div>

<div class="screen" id="game3Screen">
    <div class="game-header"><span class="label">Game 3: Team Building</span><span class="timer" id="g3Timer">0:00</span></div>
    <div class="progress-bar"><div class="progress-fill" id="g3Progress" style="width:0%"></div></div>
    <div id="g3Area"></div>
</div>

<div class="screen" id="resultsScreen">
    <div id="resultsArea"></div>
</div>

<script>
var DELEGATION = [
    { title: "Project Deadline in 3 Days", context: "A critical project is due Friday. You have 4 team members. How do you handle it?",
      options: [
        { text: "Assign specific tasks to each person based on their strengths, check in daily", dims: {PeopleBuilder:2, ProcessArchitect:2, ResultsDriver:1} },
        { text: "Do the most critical parts yourself, delegate the rest", dims: {ResultsDriver:3, ChangeDriver:1} },
        { text: "Call a team meeting, explain the situation, and let the team self-organize", dims: {CultureKeeper:2, PeopleBuilder:2, StrategicThinker:1} },
        { text: "Create a detailed project plan with milestones and assign each milestone to someone", dims: {ProcessArchitect:3, StrategicThinker:1, ResultsDriver:1} },
      ]
    },
    { title: "New Employee's First Week", context: "A new hire joins your team. They're talented but nervous. What's your priority?",
      options: [
        { text: "Pair them with a senior team member as a buddy for the first month", dims: {PeopleBuilder:3, CultureKeeper:2} },
        { text: "Give them a small project they can own and deliver in the first week", dims: {ResultsDriver:2, PeopleBuilder:1, ChangeDriver:1} },
        { text: "Walk them through every process and documentation the team uses", dims: {ProcessArchitect:3, CultureKeeper:1} },
        { text: "Have 1-on-1 lunch to understand their goals, then align their work accordingly", dims: {CultureKeeper:2, PeopleBuilder:2, StrategicThinker:1} },
      ]
    },
    { title: "Top Performer Wants a Promotion", context: "Your best performer asks for a promotion. You don't have budget for it right now.",
      options: [
        { text: "Be transparent about budget constraints, create a development plan with a timeline", dims: {PeopleBuilder:3, CultureKeeper:1, StrategicThinker:1} },
        { text: "Give them more responsibility and a new title, push for budget in next cycle", dims: {ChangeDriver:2, PeopleBuilder:1, ResultsDriver:1} },
        { text: "Escalate to your manager -- fight for the budget now", dims: {ResultsDriver:2, ChangeDriver:2, PeopleBuilder:1} },
        { text: "Offer lateral growth -- a challenging cross-functional project to build new skills", dims: {StrategicThinker:2, PeopleBuilder:2, ChangeDriver:1} },
      ]
    },
    { title: "Underperforming Team Member", context: "One person consistently misses deadlines. The rest of the team notices and morale is dropping.",
      options: [
        { text: "Private 1-on-1: understand the root cause, create a performance improvement plan", dims: {PeopleBuilder:3, ProcessArchitect:1, CultureKeeper:1} },
        { text: "Set clear expectations with consequences, document everything", dims: {ResultsDriver:3, ProcessArchitect:2} },
        { text: "Reassign their work to others for now, address it when there's less pressure", dims: {CultureKeeper:1, StrategicThinker:1} },
        { text: "Address it in a team retro -- make accountability a team-level conversation", dims: {CultureKeeper:2, ChangeDriver:2, ResultsDriver:1} },
      ]
    },
];

var CRISIS = [
    { title: "Server Down During Peak Hours", context: "Your main service is down. Customers are complaining. Your team is panicking. You have 3 options for the next 10 minutes.",
      options: [
        { text: "Take command: assign specific roles (comms, debugging, escalation), give 5-min status updates", dims: {ResultsDriver:3, ProcessArchitect:2} },
        { text: "Trust your team: 'Who knows the most about this system? You lead the fix, I'll handle comms.'", dims: {PeopleBuilder:2, CultureKeeper:2, ChangeDriver:1} },
        { text: "Follow the incident playbook step by step -- that's why we wrote it", dims: {ProcessArchitect:3, ResultsDriver:1} },
      ]
    },
    { title: "Key Person Quits With No Notice", context: "Your most knowledgeable team member just resigned effective immediately. They hold critical institutional knowledge.",
      options: [
        { text: "Immediately schedule knowledge transfer sessions, document everything they know", dims: {ProcessArchitect:3, StrategicThinker:1, ResultsDriver:1} },
        { text: "Redistribute their work, use this as an opportunity to reduce single points of failure", dims: {StrategicThinker:3, ProcessArchitect:1, ChangeDriver:1} },
        { text: "Have an honest exit conversation -- understand why, and address root causes for the rest of the team", dims: {CultureKeeper:3, PeopleBuilder:2} },
      ]
    },
    { title: "Budget Cut: Lose 2 of 8 Team Members", context: "Leadership says you need to cut 25% of your team by end of month. Your team doesn't know yet.",
      options: [
        { text: "Analyze: which roles are most critical? Keep the ones with the highest impact per dollar", dims: {StrategicThinker:3, ResultsDriver:2} },
        { text: "Push back: present data showing the cost of these cuts to leadership", dims: {ChangeDriver:3, ResultsDriver:1, StrategicThinker:1} },
        { text: "Be transparent with the team immediately. Let them know what's happening and involve them in solutions", dims: {CultureKeeper:3, PeopleBuilder:2} },
      ]
    },
    { title: "Cross-Team Conflict Escalates", context: "Two of your team members are in open conflict. It's affecting the whole team's productivity. Other teams are starting to notice.",
      options: [
        { text: "Mediate: bring both people together, facilitate a structured conversation about needs and expectations", dims: {CultureKeeper:3, PeopleBuilder:2} },
        { text: "Separate: reassign them to different projects so they don't need to work together", dims: {ProcessArchitect:2, ResultsDriver:1, StrategicThinker:1} },
        { text: "Escalate: this is a behavioral issue -- document it and involve HR", dims: {ResultsDriver:2, ProcessArchitect:2} },
        { text: "Address it as a team: 'We have a communication problem. Let's fix our working agreements.'", dims: {ChangeDriver:2, CultureKeeper:2, PeopleBuilder:1} },
      ]
    },
];

var TEAM_BUILD = [
    { title: "Allocate Your Weekly 1-on-1 Time", context: "You have 6 team members and 3 hours/week for 1-on-1s. How do you distribute?", total: 180,
      areas: [
        { name: "Coaching/development", dim: "PeopleBuilder" },
        { name: "Status updates/blockers", dim: "ProcessArchitect" },
        { name: "Strategic alignment", dim: "StrategicThinker" },
        { name: "Personal check-in/wellbeing", dim: "CultureKeeper" },
        { name: "Goal tracking/accountability", dim: "ResultsDriver" },
      ]
    },
    { title: "Design Your Team's Meeting Rhythm", context: "You're redesigning how your team communicates. Allocate 100 points across meeting types.", total: 100,
      areas: [
        { name: "Daily standup (15 min)", dim: "ProcessArchitect" },
        { name: "Weekly team sync (1 hr)", dim: "ResultsDriver" },
        { name: "Monthly strategy review", dim: "StrategicThinker" },
        { name: "Quarterly team retrospective", dim: "CultureKeeper" },
        { name: "Ad-hoc innovation time", dim: "ChangeDriver" },
      ]
    },
    { title: "Build Your Ideal Team Culture", context: "You can emphasize 5 values. How much weight do you give each?", total: 100,
      areas: [
        { name: "Growth & learning", dim: "PeopleBuilder" },
        { name: "Efficiency & quality", dim: "ProcessArchitect" },
        { name: "Innovation & experimentation", dim: "ChangeDriver" },
        { name: "Trust & psychological safety", dim: "CultureKeeper" },
        { name: "Accountability & results", dim: "ResultsDriver" },
      ]
    },
];

// STATE
var scores = { PeopleBuilder:0, ProcessArchitect:0, StrategicThinker:0, ChangeDriver:0, CultureKeeper:0, ResultsDriver:0 };
var startTime = 0, timerInt = null;
var g1Round = 0, g2Round = 0, g3Round = 0;

function startGames() {
    startTime = Date.now();
    document.getElementById('landingScreen').classList.remove('active');
    document.getElementById('landingScreen').style.display = 'none';
    showTransition(0);
}

function showTransition(gi) {
    var games = [
        { emoji: "&#128101;", title: "Delegation Decisions", desc: "4 real management scenarios. Your choices reveal how you lead." },
        { emoji: "&#128680;", title: "Crisis Management", desc: "4 urgent situations. How you respond under pressure defines your style." },
        { emoji: "&#127793;", title: "Team Building", desc: "Allocate time, design meetings, and build culture. Where you invest reveals your priorities." },
    ];
    if (gi >= games.length) { showResults(); return; }
    var t = document.getElementById('transitionScreen'); t.classList.add('active');
    document.getElementById('transEmoji').innerHTML = games[gi].emoji;
    document.getElementById('transTitle').textContent = games[gi].title;
    document.getElementById('transDesc').textContent = games[gi].desc;
    var count = 3; document.getElementById('transCount').textContent = count;
    var ci = setInterval(function() { count--; document.getElementById('transCount').textContent = count; if (count <= 0) { clearInterval(ci); t.classList.remove('active'); if (gi===0) startG1(); else if (gi===1) startG2(); else startG3(); } }, 1000);
}

function formatTime(ms) { var s = Math.floor(ms/1000); return Math.floor(s/60) + ':' + (s%60<10?'0':'') + (s%60); }

// GAME 1: DELEGATION
function startG1() { g1Round=0; var s=document.getElementById('game1Screen'); s.classList.add('active'); s.style.display='flex'; renderG1(); timerInt=setInterval(function(){ document.getElementById('g1Timer').textContent=formatTime(Date.now()-startTime); },1000); }
function renderG1() {
    if (g1Round>=DELEGATION.length) { clearInterval(timerInt); document.getElementById('game1Screen').classList.remove('active'); document.getElementById('game1Screen').style.display='none'; showTransition(1); return; }
    document.getElementById('g1Progress').style.width=(g1Round/DELEGATION.length*100)+'%';
    document.getElementById('g1Label').textContent='Scenario '+(g1Round+1)+'/'+DELEGATION.length;
    var sc=DELEGATION[g1Round], html='<div class="scenario-card"><h2>'+sc.title+'</h2><p>'+sc.context+'</p></div>';
    sc.options.forEach(function(opt,i){ html+='<button class="choice-btn" onclick="pickG1('+g1Round+','+i+',this)">'+opt.text+'</button>'; });
    document.getElementById('g1Area').innerHTML=html;
}
function pickG1(round,idx,el) { var dims=DELEGATION[round].options[idx].dims; for(var d in dims) scores[d]=(scores[d]||0)+dims[d]; el.classList.add('selected'); setTimeout(function(){ g1Round++; renderG1(); },500); }

// GAME 2: CRISIS
function startG2() { g2Round=0; var s=document.getElementById('game2Screen'); s.classList.add('active'); s.style.display='flex'; renderG2(); timerInt=setInterval(function(){ document.getElementById('g2Timer').textContent=formatTime(Date.now()-startTime); },1000); }
function renderG2() {
    if (g2Round>=CRISIS.length) { clearInterval(timerInt); document.getElementById('game2Screen').classList.remove('active'); document.getElementById('game2Screen').style.display='none'; showTransition(2); return; }
    document.getElementById('g2Progress').style.width=(g2Round/CRISIS.length*100)+'%';
    var sc=CRISIS[g2Round], html='<div class="scenario-card"><h2>'+sc.title+'</h2><p>'+sc.context+'</p></div>';
    sc.options.forEach(function(opt,i){ html+='<button class="choice-btn" onclick="pickG2('+g2Round+','+i+',this)">'+opt.text+'</button>'; });
    document.getElementById('g2Area').innerHTML=html;
}
function pickG2(round,idx,el) { var dims=CRISIS[round].options[idx].dims; for(var d in dims) scores[d]=(scores[d]||0)+dims[d]; el.classList.add('selected'); setTimeout(function(){ g2Round++; renderG2(); },500); }

// GAME 3: TEAM BUILDING (sliders)
function startG3() { g3Round=0; var s=document.getElementById('game3Screen'); s.classList.add('active'); s.style.display='flex'; renderG3(); timerInt=setInterval(function(){ document.getElementById('g3Timer').textContent=formatTime(Date.now()-startTime); },1000); }
function renderG3() {
    if (g3Round>=TEAM_BUILD.length) { clearInterval(timerInt); document.getElementById('game3Screen').classList.remove('active'); document.getElementById('game3Screen').style.display='none'; showResults(); return; }
    document.getElementById('g3Progress').style.width=(g3Round/TEAM_BUILD.length*100)+'%';
    var sc=TEAM_BUILD[g3Round], defVal=Math.round(sc.total/sc.areas.length);
    var html='<div class="card"><h2>'+sc.title+'</h2><p>'+sc.context+'</p>';
    sc.areas.forEach(function(a,i){ html+='<div class="slider-row"><span class="label">'+a.name+'</span><input type="range" min="0" max="'+Math.round(sc.total*0.6)+'" value="'+defVal+'" id="sl_'+g3Round+'_'+i+'" oninput="updateSl('+g3Round+')"><span class="value" id="sv_'+g3Round+'_'+i+'">'+defVal+'</span></div>'; });
    html+='<button class="btn btn-primary" style="margin-top:12px;" onclick="submitG3('+g3Round+')">Confirm</button></div>';
    document.getElementById('g3Area').innerHTML=html;
}
function updateSl(round) { TEAM_BUILD[round].areas.forEach(function(a,i){ document.getElementById('sv_'+round+'_'+i).textContent=document.getElementById('sl_'+round+'_'+i).value; }); }
function submitG3(round) {
    var sc=TEAM_BUILD[round];
    sc.areas.forEach(function(a,i){ var v=parseInt(document.getElementById('sl_'+round+'_'+i).value); scores[a.dim]=(scores[a.dim]||0)+Math.round(v/10); });
    g3Round++; renderG3();
}

// RESULTS
function showResults() {
    var dur=Date.now()-startTime;
    var s=document.getElementById('resultsScreen'); s.classList.add('active'); s.style.display='flex';
    var maxS=Math.max.apply(null,Object.values(scores))||1;
    var pct={}; for(var d in scores) pct[d]=Math.round(scores[d]/maxS*100);
    var sorted=Object.entries(pct).sort(function(a,b){return b[1]-a[1];});
    var topKey=sorted[0][0];
    var NAMES={PeopleBuilder:'People Builder',ProcessArchitect:'Process Architect',StrategicThinker:'Strategic Thinker',ChangeDriver:'Change Driver',CultureKeeper:'Culture Keeper',ResultsDriver:'Results Driver'};
    var TAGS={PeopleBuilder:'You grow people.',ProcessArchitect:'You build systems.',StrategicThinker:'You see the big picture.',ChangeDriver:'You drive transformation.',CultureKeeper:'You create safety.',ResultsDriver:'You deliver outcomes.'};
    var COLORS={PeopleBuilder:'#22c55e',ProcessArchitect:'#60a5fa',StrategicThinker:'#a78bfa',ChangeDriver:'#f59e0b',CultureKeeper:'#ec4899',ResultsDriver:'#ef4444'};
    var shareText="I'm a "+NAMES[topKey]+" manager! "+TAGS[topKey]+" What kind of manager are you?";
    var barsHTML='';
    sorted.forEach(function(e){ barsHTML+='<div class="dim-row"><span class="nm">'+NAMES[e[0]].split(' ')[0]+'</span><div class="bar-bg"><div class="bar-fg" style="width:0%;background:'+COLORS[e[0]]+';" data-pct="'+e[1]+'"></div></div><span class="pct">'+e[1]+'%</span></div>'; });

    document.getElementById('resultsArea').innerHTML=
        '<div class="result-card" style="text-align:center;"><p style="font-size:0.75rem;color:#64748b;text-transform:uppercase;letter-spacing:2px;">Your Leadership Style</p><div class="archetype-badge" style="color:'+COLORS[topKey]+'">'+NAMES[topKey]+'</div><p style="color:#94a3b8;font-style:italic;">'+TAGS[topKey]+'</p>'+barsHTML+'<p style="margin-top:12px;font-size:0.8rem;color:#64748b;">Game duration: '+formatTime(dur)+'</p></div>'+
        '<div class="result-card"><div style="text-align:center;"><p style="font-size:0.95rem;color:#94a3b8;margin-bottom:12px;">Share your leadership style</p><div class="share-row"><a class="wa-btn" href="https://wa.me/?text='+encodeURIComponent(shareText)+'" target="_blank">WhatsApp</a><button class="copy-btn" onclick="navigator.clipboard.writeText(window.location.href).then(function(){this.textContent=\'Copied!\'}.bind(this))">Copy link</button></div></div></div>'+
        '<div class="result-card"><div style="text-align:center;"><p style="font-size:1rem;font-weight:600;margin-bottom:4px;">Save your results</p><p style="font-size:0.8rem;color:#94a3b8;margin-bottom:12px;">Get your full leadership report</p><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;"><input type="email" id="postEmail" placeholder="you@email.com" style="padding:10px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:0.9rem;width:200px;outline:none;"><button onclick="saveEmail()" style="padding:10px 20px;background:#3b82f6;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;">Save</button></div><div id="saveMsg" style="font-size:0.85rem;color:#22c55e;margin-top:8px;display:none;"></div></div></div>'+
        '<div class="result-card" style="text-align:center;"><a href="/assessment" style="display:inline-block;padding:10px 24px;background:transparent;color:#3b82f6;border:1px solid #3b82f6;border-radius:8px;text-decoration:none;font-weight:600;">Take Full Assessment</a><br><a href="/academy" style="display:inline-block;margin-top:8px;padding:10px 24px;color:#3b82f6;border:1px solid #334155;border-radius:8px;text-decoration:none;font-weight:600;">Start the Academy</a></div>';

    setTimeout(function(){ document.querySelectorAll('.bar-fg').forEach(function(b){ b.style.width=b.dataset.pct+'%'; }); },300);
    fetch('/api/game/results',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:'anonymous_'+Date.now(),game_type:'manager_games',scores:scores,percentages:pct,dominant_trait:topKey,duration_ms:dur,timestamp:new Date().toISOString()})}).catch(function(){});
}
async function saveEmail(){ var e=document.getElementById('postEmail').value.trim().toLowerCase(); if(!e||!e.includes('@')){alert('Enter a valid email');return;} try{await fetch('/api/manager-profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,scores:scores,source:'games',timestamp:new Date().toISOString()})});}catch(x){} document.getElementById('saveMsg').textContent='Results saved!'; document.getElementById('saveMsg').style.display='block'; document.getElementById('postEmail').disabled=true; }
</script>
