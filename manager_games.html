<script>
var currentLang = localStorage.getItem('ops_lang') || 'es';

function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('ops_lang', lang);
    document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.lang-btn').forEach(function(b) {
        if (b.textContent.trim() === lang.toUpperCase()) b.classList.add('active');
    });
    document.querySelectorAll('.t').forEach(function(el) {
        var text = el.getAttribute('data-' + lang);
        if (text) el.innerHTML = text;
    });
}

function T(en, es) { return currentLang === 'es' ? es : en; }

setLang(currentLang);

var DELEGATION = [
    { title: "Project Deadline in 3 Days", title_es: "Deadline del Proyecto en 3 Dias", context: "A critical project is due Friday. You have 4 team members. How do you handle it?", context_es: "Un proyecto critico se entrega el viernes. Tienes 4 miembros en tu equipo. Como lo manejas?",
      options: [
        { text: "Assign specific tasks to each person based on their strengths, check in daily", text_es: "Asignar tareas especificas a cada persona segun sus fortalezas, revisar diariamente", dims: {PeopleBuilder:2, ProcessArchitect:2, ResultsDriver:1} },
        { text: "Do the most critical parts yourself, delegate the rest", text_es: "Hacer las partes mas criticas tu mismo, delegar el resto", dims: {ResultsDriver:3, ChangeDriver:1} },
        { text: "Call a team meeting, explain the situation, and let the team self-organize", text_es: "Convocar una junta de equipo, explicar la situacion y dejar que el equipo se auto-organice", dims: {CultureKeeper:2, PeopleBuilder:2, StrategicThinker:1} },
        { text: "Create a detailed project plan with milestones and assign each milestone to someone", text_es: "Crear un plan de proyecto detallado con hitos y asignar cada hito a alguien", dims: {ProcessArchitect:3, StrategicThinker:1, ResultsDriver:1} },
      ]
    },
    { title: "New Employee's First Week", title_es: "Primera Semana del Nuevo Empleado", context: "A new hire joins your team. They're talented but nervous. What's your priority?", context_es: "Un nuevo integrante se une a tu equipo. Es talentoso pero esta nervioso. Cual es tu prioridad?",
      options: [
        { text: "Pair them with a senior team member as a buddy for the first month", text_es: "Asignarle un companero senior como buddy durante el primer mes", dims: {PeopleBuilder:3, CultureKeeper:2} },
        { text: "Give them a small project they can own and deliver in the first week", text_es: "Darle un proyecto pequeno que pueda liderar y entregar en la primera semana", dims: {ResultsDriver:2, PeopleBuilder:1, ChangeDriver:1} },
        { text: "Walk them through every process and documentation the team uses", text_es: "Guiarlo por cada proceso y documentacion que usa el equipo", dims: {ProcessArchitect:3, CultureKeeper:1} },
        { text: "Have 1-on-1 lunch to understand their goals, then align their work accordingly", text_es: "Tener una comida 1-a-1 para entender sus metas y alinear su trabajo", dims: {CultureKeeper:2, PeopleBuilder:2, StrategicThinker:1} },
      ]
    },
    { title: "Top Performer Wants a Promotion", title_es: "Tu Mejor Elemento Quiere un Ascenso", context: "Your best performer asks for a promotion. You don't have budget for it right now.", context_es: "Tu mejor elemento pide un ascenso. No tienes presupuesto para eso ahora.",
      options: [
        { text: "Be transparent about budget constraints, create a development plan with a timeline", text_es: "Ser transparente sobre las limitaciones de presupuesto, crear un plan de desarrollo con fechas", dims: {PeopleBuilder:3, CultureKeeper:1, StrategicThinker:1} },
        { text: "Give them more responsibility and a new title, push for budget in next cycle", text_es: "Darle mas responsabilidad y un nuevo titulo, pelear por presupuesto en el siguiente ciclo", dims: {ChangeDriver:2, PeopleBuilder:1, ResultsDriver:1} },
        { text: "Escalate to your manager -- fight for the budget now", text_es: "Escalar con tu jefe -- pelear por el presupuesto ahora", dims: {ResultsDriver:2, ChangeDriver:2, PeopleBuilder:1} },
        { text: "Offer lateral growth -- a challenging cross-functional project to build new skills", text_es: "Ofrecer crecimiento lateral -- un proyecto cross-funcional retador para desarrollar nuevas habilidades", dims: {StrategicThinker:2, PeopleBuilder:2, ChangeDriver:1} },
      ]
    },
    { title: "Underperforming Team Member", title_es: "Miembro del Equipo con Bajo Rendimiento", context: "One person consistently misses deadlines. The rest of the team notices and morale is dropping.", context_es: "Una persona consistentemente no cumple los plazos. El resto del equipo lo nota y la moral esta bajando.",
      options: [
        { text: "Private 1-on-1: understand the root cause, create a performance improvement plan", text_es: "1-a-1 privado: entender la causa raiz, crear un plan de mejora de desempeno", dims: {PeopleBuilder:3, ProcessArchitect:1, CultureKeeper:1} },
        { text: "Set clear expectations with consequences, document everything", text_es: "Establecer expectativas claras con consecuencias, documentar todo", dims: {ResultsDriver:3, ProcessArchitect:2} },
        { text: "Reassign their work to others for now, address it when there's less pressure", text_es: "Reasignar su trabajo a otros por ahora, abordarlo cuando haya menos presion", dims: {CultureKeeper:1, StrategicThinker:1} },
        { text: "Address it in a team retro -- make accountability a team-level conversation", text_es: "Abordarlo en una retro de equipo -- hacer de la responsabilidad una conversacion grupal", dims: {CultureKeeper:2, ChangeDriver:2, ResultsDriver:1} },
      ]
    },
];

var CRISIS = [
    { title: "Server Down During Peak Hours", title_es: "Servidor Caido en Horas Pico", context: "Your main service is down. Customers are complaining. Your team is panicking. You have 3 options for the next 10 minutes.", context_es: "Tu servicio principal esta caido. Los clientes se quejan. Tu equipo esta en panico. Tienes 3 opciones para los proximos 10 minutos.",
      options: [
        { text: "Take command: assign specific roles (comms, debugging, escalation), give 5-min status updates", text_es: "Tomar el mando: asignar roles especificos (comunicacion, debugging, escalacion), dar actualizaciones cada 5 min", dims: {ResultsDriver:3, ProcessArchitect:2} },
        { text: "Trust your team: 'Who knows the most about this system? You lead the fix, I'll handle comms.'", text_es: "Confiar en tu equipo: 'Quien sabe mas de este sistema? Tu lidera la solucion, yo manejo la comunicacion.'", dims: {PeopleBuilder:2, CultureKeeper:2, ChangeDriver:1} },
        { text: "Follow the incident playbook step by step -- that's why we wrote it", text_es: "Seguir el playbook de incidentes paso a paso -- para eso lo escribimos", dims: {ProcessArchitect:3, ResultsDriver:1} },
      ]
    },
    { title: "Key Person Quits With No Notice", title_es: "Persona Clave Renuncia Sin Aviso", context: "Your most knowledgeable team member just resigned effective immediately. They hold critical institutional knowledge.", context_es: "Tu miembro de equipo con mas conocimiento acaba de renunciar con efecto inmediato. Tiene conocimiento institucional critico.",
      options: [
        { text: "Immediately schedule knowledge transfer sessions, document everything they know", text_es: "Programar sesiones de transferencia de conocimiento inmediatamente, documentar todo lo que saben", dims: {ProcessArchitect:3, StrategicThinker:1, ResultsDriver:1} },
        { text: "Redistribute their work, use this as an opportunity to reduce single points of failure", text_es: "Redistribuir su trabajo, usar esto como oportunidad para reducir puntos unicos de falla", dims: {StrategicThinker:3, ProcessArchitect:1, ChangeDriver:1} },
        { text: "Have an honest exit conversation -- understand why, and address root causes for the rest of the team", text_es: "Tener una conversacion de salida honesta -- entender por que, y abordar las causas raiz para el resto del equipo", dims: {CultureKeeper:3, PeopleBuilder:2} },
      ]
    },
    { title: "Budget Cut: Lose 2 of 8 Team Members", title_es: "Recorte de Presupuesto: Perder 2 de 8 Miembros", context: "Leadership says you need to cut 25% of your team by end of month. Your team doesn't know yet.", context_es: "La direccion dice que necesitas recortar el 25% de tu equipo para fin de mes. Tu equipo aun no lo sabe.",
      options: [
        { text: "Analyze: which roles are most critical? Keep the ones with the highest impact per dollar", text_es: "Analizar: cuales roles son mas criticos? Mantener los de mayor impacto por peso invertido", dims: {StrategicThinker:3, ResultsDriver:2} },
        { text: "Push back: present data showing the cost of these cuts to leadership", text_es: "Empujar de vuelta: presentar datos mostrando el costo de estos recortes a la direccion", dims: {ChangeDriver:3, ResultsDriver:1, StrategicThinker:1} },
        { text: "Be transparent with the team immediately. Let them know what's happening and involve them in solutions", text_es: "Ser transparente con el equipo inmediatamente. Hacerles saber que esta pasando e involucrarlos en soluciones", dims: {CultureKeeper:3, PeopleBuilder:2} },
      ]
    },
    { title: "Cross-Team Conflict Escalates", title_es: "Conflicto Entre Equipos Escala", context: "Two of your team members are in open conflict. It's affecting the whole team's productivity. Other teams are starting to notice.", context_es: "Dos miembros de tu equipo estan en conflicto abierto. Esta afectando la productividad de todo el equipo. Otros equipos lo estan notando.",
      options: [
        { text: "Mediate: bring both people together, facilitate a structured conversation about needs and expectations", text_es: "Mediar: reunir a ambas personas, facilitar una conversacion estructurada sobre necesidades y expectativas", dims: {CultureKeeper:3, PeopleBuilder:2} },
        { text: "Separate: reassign them to different projects so they don't need to work together", text_es: "Separar: reasignarlos a proyectos diferentes para que no necesiten trabajar juntos", dims: {ProcessArchitect:2, ResultsDriver:1, StrategicThinker:1} },
        { text: "Escalate: this is a behavioral issue -- document it and involve HR", text_es: "Escalar: es un problema de conducta -- documentarlo e involucrar a RH", dims: {ResultsDriver:2, ProcessArchitect:2} },
        { text: "Address it as a team: 'We have a communication problem. Let's fix our working agreements.'", text_es: "Abordarlo como equipo: 'Tenemos un problema de comunicacion. Arreglemos nuestros acuerdos de trabajo.'", dims: {ChangeDriver:2, CultureKeeper:2, PeopleBuilder:1} },
      ]
    },
];

var TEAM_BUILD = [
    { title: "Allocate Your Weekly 1-on-1 Time", title_es: "Asigna Tu Tiempo Semanal de 1-a-1", context: "You have 6 team members and 3 hours/week for 1-on-1s. How do you distribute?", context_es: "Tienes 6 miembros de equipo y 3 horas/semana para 1-a-1. Como las distribuyes?", total: 180,
      areas: [
        { name: "Coaching/development", name_es: "Coaching/desarrollo", dim: "PeopleBuilder" },
        { name: "Status updates/blockers", name_es: "Actualizaciones/bloqueos", dim: "ProcessArchitect" },
        { name: "Strategic alignment", name_es: "Alineacion estrategica", dim: "StrategicThinker" },
        { name: "Personal check-in/wellbeing", name_es: "Check-in personal/bienestar", dim: "CultureKeeper" },
        { name: "Goal tracking/accountability", name_es: "Seguimiento de metas", dim: "ResultsDriver" },
      ]
    },
    { title: "Design Your Team's Meeting Rhythm", title_es: "Disena el Ritmo de Juntas de Tu Equipo", context: "You're redesigning how your team communicates. Allocate 100 points across meeting types.", context_es: "Estas rediseando como se comunica tu equipo. Asigna 100 puntos entre tipos de juntas.", total: 100,
      areas: [
        { name: "Daily standup (15 min)", name_es: "Daily standup (15 min)", dim: "ProcessArchitect" },
        { name: "Weekly team sync (1 hr)", name_es: "Sync semanal de equipo (1 hr)", dim: "ResultsDriver" },
        { name: "Monthly strategy review", name_es: "Revision estrategica mensual", dim: "StrategicThinker" },
        { name: "Quarterly team retrospective", name_es: "Retrospectiva trimestral", dim: "CultureKeeper" },
        { name: "Ad-hoc innovation time", name_es: "Tiempo de innovacion libre", dim: "ChangeDriver" },
      ]
    },
    { title: "Build Your Ideal Team Culture", title_es: "Construye Tu Cultura de Equipo Ideal", context: "You can emphasize 5 values. How much weight do you give each?", context_es: "Puedes enfatizar 5 valores. Cuanto peso le das a cada uno?", total: 100,
      areas: [
        { name: "Growth & learning", name_es: "Crecimiento y aprendizaje", dim: "PeopleBuilder" },
        { name: "Efficiency & quality", name_es: "Eficiencia y calidad", dim: "ProcessArchitect" },
        { name: "Innovation & experimentation", name_es: "Innovacion y experimentacion", dim: "ChangeDriver" },
        { name: "Trust & psychological safety", name_es: "Confianza y seguridad psicologica", dim: "CultureKeeper" },
        { name: "Accountability & results", name_es: "Responsabilidad y resultados", dim: "ResultsDriver" },
      ]
    },
];

// STATE
var scores = { PeopleBuilder:0, ProcessArchitect:0, StrategicThinker:0, ChangeDriver:0, CultureKeeper:0, ResultsDriver:0 };
var startTime = 0, timerInt = null;
var g1Round = 0, g2Round = 0, g3Round = 0;

function startGames() {
    startTime = Date.now();
    document.getElementById('landingScreen').classList.remove('active');
    document.getElementById('landingScreen').style.display = 'none';
    showTransition(0);
}

function showTransition(gi) {
    var games = [
        { emoji: "&#128101;", title: T("Delegation Decisions","Decisiones de Delegacion"), desc: T("4 real management scenarios. Your choices reveal how you lead.","4 escenarios reales de gestion. Tus decisiones revelan como lideras.") },
        { emoji: "&#128680;", title: T("Crisis Management","Manejo de Crisis"), desc: T("4 urgent situations. How you respond under pressure defines your style.","4 situaciones urgentes. Como respondes bajo presion define tu estilo.") },
        { emoji: "&#127793;", title: T("Team Building","Construccion de Equipo"), desc: T("Allocate time, design meetings, and build culture. Where you invest reveals your priorities.","Asigna tiempo, disena reuniones y construye cultura. Donde inviertes revela tus prioridades.") },
    ];
    if (gi >= games.length) { showResults(); return; }
    var t = document.getElementById('transitionScreen'); t.classList.add('active');
    document.getElementById('transEmoji').innerHTML = games[gi].emoji;
    document.getElementById('transTitle').textContent = games[gi].title;
    document.getElementById('transDesc').textContent = games[gi].desc;
    var count = 3; document.getElementById('transCount').textContent = count;
    var ci = setInterval(function() { count--; document.getElementById('transCount').textContent = count; if (count <= 0) { clearInterval(ci); t.classList.remove('active'); if (gi===0) startG1(); else if (gi===1) startG2(); else startG3(); } }, 1000);
}

function formatTime(ms) { var s = Math.floor(ms/1000); return Math.floor(s/60) + ':' + (s%60<10?'0':'') + (s%60); }

// GAME 1: DELEGATION
function startG1() { g1Round=0; var s=document.getElementById('game1Screen'); s.classList.add('active'); s.style.display='flex'; document.getElementById('g1Label').textContent=T('Game 1: Delegation','Juego 1: Delegacion'); renderG1(); timerInt=setInterval(function(){ document.getElementById('g1Timer').textContent=formatTime(Date.now()-startTime); },1000); }
function renderG1() {
    if (g1Round>=DELEGATION.length) { clearInterval(timerInt); document.getElementById('game1Screen').classList.remove('active'); document.getElementById('game1Screen').style.display='none'; showTransition(1); return; }
    document.getElementById('g1Progress').style.width=(g1Round/DELEGATION.length*100)+'%';
    document.getElementById('g1Label').textContent=T('Scenario','Escenario')+' '+(g1Round+1)+'/'+DELEGATION.length;
    var sc=DELEGATION[g1Round], html='<div class="scenario-card"><h2>'+(currentLang==='es'?(sc.title_es||sc.title):sc.title)+'</h2><p>'+(currentLang==='es'?(sc.context_es||sc.context):sc.context)+'</p></div>';
    sc.options.forEach(function(opt,i){ html+='<button class="choice-btn" onclick="pickG1('+g1Round+','+i+',this)">'+(currentLang==='es'?(opt.text_es||opt.text):opt.text)+'</button>'; });
    document.getElementById('g1Area').innerHTML=html;
}
function pickG1(round,idx,el) { var dims=DELEGATION[round].options[idx].dims; for(var d in dims) scores[d]=(scores[d]||0)+dims[d]; el.classList.add('selected'); setTimeout(function(){ g1Round++; renderG1(); },500); }

// GAME 2: CRISIS
function startG2() { g2Round=0; var s=document.getElementById('game2Screen'); s.classList.add('active'); s.style.display='flex'; document.getElementById('g2Label').textContent=T('Game 2: Crisis Management','Juego 2: Manejo de Crisis'); renderG2(); timerInt=setInterval(function(){ document.getElementById('g2Timer').textContent=formatTime(Date.now()-startTime); },1000); }
function renderG2() {
    if (g2Round>=CRISIS.length) { clearInterval(timerInt); document.getElementById('game2Screen').classList.remove('active'); document.getElementById('game2Screen').style.display='none'; showTransition(2); return; }
    document.getElementById('g2Progress').style.width=(g2Round/CRISIS.length*100)+'%';
    document.getElementById('g2Label').textContent=T('Scenario','Escenario')+' '+(g2Round+1)+'/'+CRISIS.length;
    var sc=CRISIS[g2Round], html='<div class="scenario-card"><h2>'+(currentLang==='es'?(sc.title_es||sc.title):sc.title)+'</h2><p>'+(currentLang==='es'?(sc.context_es||sc.context):sc.context)+'</p></div>';
    sc.options.forEach(function(opt,i){ html+='<button class="choice-btn" onclick="pickG2('+g2Round+','+i+',this)">'+(currentLang==='es'?(opt.text_es||opt.text):opt.text)+'</button>'; });
    document.getElementById('g2Area').innerHTML=html;
}
function pickG2(round,idx,el) { var dims=CRISIS[round].options[idx].dims; for(var d in dims) scores[d]=(scores[d]||0)+dims[d]; el.classList.add('selected'); setTimeout(function(){ g2Round++; renderG2(); },500); }

// GAME 3: TEAM BUILDING (sliders)
function startG3() { g3Round=0; var s=document.getElementById('game3Screen'); s.classList.add('active'); s.style.display='flex'; document.getElementById('g3Label').textContent=T('Game 3: Team Building','Juego 3: Construccion de Equipo'); renderG3(); timerInt=setInterval(function(){ document.getElementById('g3Timer').textContent=formatTime(Date.now()-startTime); },1000); }
function renderG3() {
    if (g3Round>=TEAM_BUILD.length) { clearInterval(timerInt); document.getElementById('game3Screen').classList.remove('active'); document.getElementById('game3Screen').style.display='none'; showResults(); return; }
    document.getElementById('g3Progress').style.width=(g3Round/TEAM_BUILD.length*100)+'%';
    document.getElementById('g3Label').textContent=T('Scenario','Escenario')+' '+(g3Round+1)+'/'+TEAM_BUILD.length;
    var sc=TEAM_BUILD[g3Round], defVal=Math.round(sc.total/sc.areas.length);
    var html='<div class="card"><h2>'+(currentLang==='es'?(sc.title_es||sc.title):sc.title)+'</h2><p>'+(currentLang==='es'?(sc.context_es||sc.context):sc.context)+'</p>';
    sc.areas.forEach(function(a,i){ html+='<div class="slider-row"><span class="label">'+(currentLang==='es'?(a.name_es||a.name):a.name)+'</span><input type="range" min="0" max="'+Math.round(sc.total*0.6)+'" value="'+defVal+'" id="sl_'+g3Round+'_'+i+'" oninput="updateSl('+g3Round+')"><span class="value" id="sv_'+g3Round+'_'+i+'">'+defVal+'</span></div>'; });
    html+='<button class="btn btn-primary" style="margin-top:12px;" onclick="submitG3('+g3Round+')">'+T('Confirm','Confirmar')+'</button></div>';
    document.getElementById('g3Area').innerHTML=html;
}
function updateSl(round) { TEAM_BUILD[round].areas.forEach(function(a,i){ document.getElementById('sv_'+round+'_'+i).textContent=document.getElementById('sl_'+round+'_'+i).value; }); }
function submitG3(round) {
    var sc=TEAM_BUILD[round];
    sc.areas.forEach(function(a,i){ var v=parseInt(document.getElementById('sl_'+round+'_'+i).value); scores[a.dim]=(scores[a.dim]||0)+Math.round(v/10); });
    g3Round++; renderG3();
}

// RESULTS
function showResults() {
    var dur=Date.now()-startTime;
    var s=document.getElementById('resultsScreen'); s.classList.add('active'); s.style.display='flex';
    var maxS=Math.max.apply(null,Object.values(scores))||1;
    var pct={}; for(var d in scores) pct[d]=Math.round(scores[d]/maxS*100);
    var sorted=Object.entries(pct).sort(function(a,b){return b[1]-a[1];});
    var topKey=sorted[0][0];
    var NAMES={PeopleBuilder:'People Builder',ProcessArchitect:'Process Architect',StrategicThinker:'Strategic Thinker',ChangeDriver:'Change Driver',CultureKeeper:'Culture Keeper',ResultsDriver:'Results Driver'};
    var NAMES_ES={PeopleBuilder:'Constructor de Personas',ProcessArchitect:'Arquitecto de Procesos',StrategicThinker:'Pensador Estrategico',ChangeDriver:'Motor de Cambio',CultureKeeper:'Guardian de Cultura',ResultsDriver:'Impulsor de Resultados'};
    var TAGS={PeopleBuilder:'You grow people.',ProcessArchitect:'You build systems.',StrategicThinker:'You see the big picture.',ChangeDriver:'You drive transformation.',CultureKeeper:'You create safety.',ResultsDriver:'You deliver outcomes.'};
    var TAGS_ES={PeopleBuilder:'Desarrollas personas.',ProcessArchitect:'Construyes sistemas.',StrategicThinker:'Ves el panorama completo.',ChangeDriver:'Impulsas la transformacion.',CultureKeeper:'Creas seguridad.',ResultsDriver:'Entregas resultados.'};
    var COLORS={PeopleBuilder:'#22c55e',ProcessArchitect:'#60a5fa',StrategicThinker:'#a78bfa',ChangeDriver:'#f59e0b',CultureKeeper:'#ec4899',ResultsDriver:'#ef4444'};
    var displayNames = currentLang==='es' ? NAMES_ES : NAMES;
    var displayTags = currentLang==='es' ? TAGS_ES : TAGS;
    var shareText = currentLang==='es' ? "Soy un manager "+displayNames[topKey]+"! "+displayTags[topKey]+" Que tipo de manager eres tu?" : "I'm a "+NAMES[topKey]+" manager! "+TAGS[topKey]+" What kind of manager are you?";
    var barsHTML='';
    sorted.forEach(function(e){ barsHTML+='<div class="dim-row"><span class="nm">'+displayNames[e[0]].split(' ')[0]+'</span><div class="bar-bg"><div class="bar-fg" style="width:0%;background:'+COLORS[e[0]]+';" data-pct="'+e[1]+'"></div></div><span class="pct">'+e[1]+'%</span></div>'; });

    document.getElementById('resultsArea').innerHTML=
        '<div class="result-card" style="text-align:center;"><p style="font-size:0.75rem;color:#64748b;text-transform:uppercase;letter-spacing:2px;">'+T('Your Leadership Style','Tu Estilo de Liderazgo')+'</p><div class="archetype-badge" style="color:'+COLORS[topKey]+'">'+displayNames[topKey]+'</div><p style="color:#94a3b8;font-style:italic;">'+displayTags[topKey]+'</p>'+barsHTML+'<p style="margin-top:12px;font-size:0.8rem;color:#64748b;">'+T('Game duration: ','Duracion del juego: ')+formatTime(dur)+'</p></div>'+
        '<div class="result-card"><div style="text-align:center;"><p style="font-size:0.95rem;color:#94a3b8;margin-bottom:12px;">'+T('Share your leadership style','Comparte tu estilo de liderazgo')+'</p><div class="share-row"><a class="wa-btn" href="https://wa.me/?text='+encodeURIComponent(shareText)+'" target="_blank">WhatsApp</a><button class="copy-btn" onclick="navigator.clipboard.writeText(window.location.href).then(function(){this.textContent=\''+T('Copied!','Copiado!')+'\'}.bind(this))">'+T('Copy link','Copiar link')+'</button></div></div></div>'+
        '<div class="result-card"><div style="text-align:center;"><p style="font-size:1rem;font-weight:600;margin-bottom:4px;">'+T('Save your results','Guarda tus resultados')+'</p><p style="font-size:0.8rem;color:#94a3b8;margin-bottom:12px;">'+T('Get your full leadership report','Recibe tu reporte completo de liderazgo')+'</p><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;"><input type="email" id="postEmail" placeholder="you@email.com" style="padding:10px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#e2e8f0;font-size:0.9rem;width:200px;outline:none;"><button onclick="saveEmail()" style="padding:10px 20px;background:#3b82f6;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;">'+T('Save','Guardar')+'</button></div><div id="saveMsg" style="font-size:0.85rem;color:#22c55e;margin-top:8px;display:none;"></div></div></div>'+
        '<div class="result-card" style="text-align:center;"><a href="/assessment" style="display:inline-block;padding:10px 24px;background:transparent;color:#3b82f6;border:1px solid #3b82f6;border-radius:8px;text-decoration:none;font-weight:600;">'+T('Take Full Assessment','Tomar Evaluacion Completa')+'</a><br><a href="/academy" style="display:inline-block;margin-top:8px;padding:10px 24px;color:#3b82f6;border:1px solid #334155;border-radius:8px;text-decoration:none;font-weight:600;">'+T('Start the Academy','Iniciar la Academia')+'</a></div>';

    setTimeout(function(){ document.querySelectorAll('.bar-fg').forEach(function(b){ b.style.width=b.dataset.pct+'%'; }); },300);
    fetch('/api/game/results',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:'anonymous_'+Date.now(),game_type:'manager_games',scores:scores,percentages:pct,dominant_trait:topKey,duration_ms:dur,timestamp:new Date().toISOString()})}).catch(function(){});
}
async function saveEmail(){ var e=document.getElementById('postEmail').value.trim().toLowerCase(); if(!e||!e.includes('@')){alert(T('Enter a valid email','Ingresa un email valido'));return;} try{await fetch('/api/manager-profile',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,scores:scores,source:'games',timestamp:new Date().toISOString()})});}catch(x){} document.getElementById('saveMsg').textContent=T('Results saved!','Resultados guardados!'); document.getElementById('saveMsg').style.display='block'; document.getElementById('postEmail').disabled=true; }
</script>
</body>
</html>
